name: CI/CD

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Upgrade pip
        run: pip install --upgrade pip setuptools wheel

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short -m "not integration"

  build:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write
      contents: read
    outputs:
      image_tag: ${{ steps.build_dagster.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.GHA_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Dagster image
        id: build_dagster
        env:
          REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
        run: |
          [ -n "$REGISTRY" ] || { echo "ERROR: REGISTRY is empty — AWS_ACCOUNT_ID or AWS_REGION secret is unset"; exit 1; }
          IMAGE_URI=$REGISTRY/trading-analysis-dagster:${{ github.sha }}
          IMAGE_LATEST=$REGISTRY/trading-analysis-dagster:latest
          IMAGE_CACHE=$REGISTRY/trading-analysis-dagster:cache
          docker buildx build \
            --cache-from type=registry,ref=$IMAGE_CACHE \
            --cache-to   type=registry,ref=$IMAGE_CACHE,mode=max \
            --provenance=false \
            -t $IMAGE_URI -t $IMAGE_LATEST \
            --push .
          # Output only the image tag (not the full URI) to avoid GitHub
          # suppressing the output because it contains a masked secret (AWS account ID).
          echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT


  deploy-dagster:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.GHA_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy Dagster to ECS
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          DEPLOY_REGION: ${{ secrets.AWS_REGION }}
          ECS_CLUSTER: trading-analysis
          REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
        run: |
          set -eu
          [ -n "$IMAGE_TAG" ] || { echo "ERROR: IMAGE_TAG is empty — build job output missing"; exit 1; }
          IMAGE_URI=$REGISTRY/trading-analysis-dagster:$IMAGE_TAG
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition trading-analysis-dagster \
            --region $DEPLOY_REGION \
            --query taskDefinition \
            --output json)

          NEW_TASK=$(echo "$TASK_DEF" | python3 -c "
          import sys, json
          img = sys.argv[1]
          td = json.load(sys.stdin)
          for c in td['containerDefinitions']:
              if c['name'] in ('dagster-webserver', 'dagster-daemon'):
                  c['image'] = img
          for k in ('taskDefinitionArn','revision','status','requiresAttributes','compatibilities','registeredAt','registeredBy'):
              td.pop(k, None)
          print(json.dumps(td))
          " "$IMAGE_URI")

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK" \
            --region $DEPLOY_REGION \
            --query taskDefinition.taskDefinitionArn \
            --output text)

          [ -n "$NEW_ARN" ] || { echo "ERROR: register-task-definition returned empty ARN"; exit 1; }
          echo "Registered: $NEW_ARN"

          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service trading-analysis-dagster \
            --task-definition "$NEW_ARN" \
            --force-new-deployment \
            --region $DEPLOY_REGION \
            --output json > /dev/null

      - name: Wait for Dagster service stability
        env:
          DEPLOY_REGION: ${{ secrets.AWS_REGION }}
          ECS_CLUSTER: trading-analysis
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services trading-analysis-dagster \
            --region $DEPLOY_REGION
          echo "Dagster deploy complete."
          aws ecs describe-services \
            --cluster $ECS_CLUSTER \
            --services trading-analysis-dagster \
            --region $DEPLOY_REGION \
            --query 'services[*].{Name:serviceName,Status:status,Running:runningCount,Desired:desiredCount}' \
            --output table

  terraform:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.GHA_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install Terraform 1.5.7
        run: |
          curl -sSL https://releases.hashicorp.com/terraform/1.5.7/terraform_1.5.7_linux_amd64.zip -o tf.zip
          unzip tf.zip && sudo mv terraform /usr/local/bin/ && rm tf.zip

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Apply
        run: |
          terraform apply \
            -auto-approve \
            -input=false \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="environment=default" \
            -var="github_repo=williamwxz/trading-analysis"

  deploy-grafana-cloud:
    runs-on: ubuntu-latest
    needs: terraform
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.GHA_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upsert CloudWatch datasource in Grafana Cloud
        env:
          GRAFANA_CLOUD_TOKEN: ${{ secrets.GRAFANA_CLOUD_TOKEN }}
          GRAFANA_CLOUD_URL: ${{ secrets.GRAFANA_CLOUD_URL }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          set -eu
          SECRET=$(aws secretsmanager get-secret-value \
            --secret-id trading-analysis/grafana-cloudwatch \
            --region ap-northeast-1 \
            --query SecretString --output text)
          CW_KEY_ID=$(echo "$SECRET" | python3 -c "import sys,json; print(json.load(sys.stdin)['access_key_id'])")
          CW_SECRET=$(echo "$SECRET" | python3 -c "import sys,json; print(json.load(sys.stdin)['secret_access_key'])")

          PAYLOAD=$(python3 -c "
          import json, sys
          print(json.dumps({
            'name': 'cloudwatch',
            'type': 'cloudwatch',
            'uid': 'cloudwatch',
            'access': 'proxy',
            'isDefault': False,
            'jsonData': {
              'authType': 'keys',
              'defaultRegion': 'us-east-1',
            },
            'secureJsonData': {
              'accessKey': sys.argv[1],
              'secretKey': sys.argv[2],
            },
          }))
          " "$CW_KEY_ID" "$CW_SECRET")

          # GET datasource by name to find its ID, then PUT to update or POST to create
          DS_ID=$(curl -s \
            -H "Authorization: Bearer $GRAFANA_CLOUD_TOKEN" \
            "$GRAFANA_CLOUD_URL/api/datasources/name/cloudwatch" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null || true)

          if [[ -n "$DS_ID" ]]; then
            echo "Datasource found (id=$DS_ID), updating..."
            HTTP_STATUS=$(curl -s -o /tmp/grafana_ds_response.json -w "%{http_code}" \
              -X PUT \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $GRAFANA_CLOUD_TOKEN" \
              "$GRAFANA_CLOUD_URL/api/datasources/$DS_ID" \
              -d "$PAYLOAD")
          else
            echo "Datasource not found, creating..."
            HTTP_STATUS=$(curl -s -o /tmp/grafana_ds_response.json -w "%{http_code}" \
              -X POST \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $GRAFANA_CLOUD_TOKEN" \
              "$GRAFANA_CLOUD_URL/api/datasources" \
              -d "$PAYLOAD")
          fi
          if [[ "$HTTP_STATUS" -lt 200 || "$HTTP_STATUS" -ge 300 ]]; then
            echo "ERROR: datasource upsert returned HTTP $HTTP_STATUS"
            cat /tmp/grafana_ds_response.json
            exit 1
          fi
          echo "OK: CloudWatch datasource upserted (HTTP $HTTP_STATUS)"

      - name: Push dashboards to Grafana Cloud
        env:
          GRAFANA_CLOUD_TOKEN: ${{ secrets.GRAFANA_CLOUD_TOKEN }}
          GRAFANA_CLOUD_URL: ${{ secrets.GRAFANA_CLOUD_URL }}
        run: |
          set -eu
          for file in infra/grafana/dashboards/*.json; do
            echo "Uploading $file..."
            HTTP_STATUS=$(curl -s -o /tmp/grafana_response.json -w "%{http_code}" \
              -X POST \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $GRAFANA_CLOUD_TOKEN" \
              "$GRAFANA_CLOUD_URL/api/dashboards/db" \
              -d "{\"dashboard\": $(cat "$file"), \"overwrite\": true, \"folderId\": 0}")
            if [[ "$HTTP_STATUS" -lt 200 || "$HTTP_STATUS" -ge 300 ]]; then
              echo "ERROR: $file returned HTTP $HTTP_STATUS"
              cat /tmp/grafana_response.json
              exit 1
            fi
            echo "OK: $file (HTTP $HTTP_STATUS)"
          done
          echo "All dashboards uploaded."

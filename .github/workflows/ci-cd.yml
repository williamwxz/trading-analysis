name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      dagster:      ${{ steps.filter.outputs.dagster      == 'true' || steps.filter.outputs.terraform == 'true' || steps.force.outputs.dagster      == 'true' }}
      streaming:    ${{ steps.filter.outputs.streaming    == 'true' || steps.filter.outputs.terraform == 'true' || steps.force.outputs.streaming    == 'true' }}
      pnl-consumer: ${{ steps.filter.outputs.pnl-consumer == 'true' || steps.filter.outputs.terraform == 'true' || steps.force.outputs.pnl-consumer == 'true' }}
      terraform:    ${{ steps.filter.outputs.terraform    == 'true' || steps.force.outputs.terraform    == 'true' }}
      grafana:      ${{ steps.filter.outputs.grafana      == 'true' || steps.filter.outputs.terraform == 'true' || steps.force.outputs.grafana      == 'true' }}
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dorny/paths-filter@v4.0.1
        if: github.event_name == 'push'
        id: filter
        with:
          filters: |
            dagster:
              - 'trading_dagster/**'
              - 'Dockerfile'
              - 'pyproject.toml'
              - 'dagster.yaml'
              - '.github/workflows/ci-cd.yml'
            streaming:
              - 'streaming/**'
            pnl-consumer:
              - 'pnl_consumer/**'
            terraform:
              - 'infra/terraform/**'
            grafana:
              - 'infra/grafana/**'

      - name: Force all outputs on manual dispatch
        id: force
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "dagster=true"      >> $GITHUB_OUTPUT
          echo "streaming=true"    >> $GITHUB_OUTPUT
          echo "pnl-consumer=true" >> $GITHUB_OUTPUT
          echo "terraform=true"    >> $GITHUB_OUTPUT
          echo "grafana=true"      >> $GITHUB_OUTPUT

  test:
    runs-on: ubuntu-latest
    needs: detect-changes
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Upgrade pip
        run: pip install --upgrade pip setuptools wheel

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short -m "not integration"

  integration-test:
    runs-on: ubuntu-latest
    needs: [test, detect-changes]
    if: needs.detect-changes.outputs.streaming == 'true'
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Upgrade pip
        run: pip install --upgrade pip setuptools wheel

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run streaming integration tests
        run: pytest tests/streaming/test_streaming_integration.py -v --tb=short -m streaming_integration

  build-dagster:
    runs-on: ubuntu-latest
    needs: [test, terraform, detect-changes]
    if: |
      always() &&
      needs.test.result == 'success' &&
      (needs.terraform.result == 'success' || needs.terraform.result == 'skipped') &&
      needs.detect-changes.outputs.dagster == 'true'
    permissions:
      id-token: write
      contents: read
    outputs:
      image_tag: ${{ steps.build.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.GHA_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Dagster image
        id: build
        env:
          REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
        run: |
          [ -n "$REGISTRY" ] || { echo "ERROR: REGISTRY is empty — AWS_ACCOUNT_ID or AWS_REGION secret is unset"; exit 1; }
          IMAGE_URI=$REGISTRY/trading-analysis-dagster:${{ github.sha }}
          IMAGE_LATEST=$REGISTRY/trading-analysis-dagster:latest
          IMAGE_CACHE=$REGISTRY/trading-analysis-dagster:cache
          docker buildx build \
            --cache-from type=registry,ref=$IMAGE_CACHE \
            --cache-to   type=registry,ref=$IMAGE_CACHE,mode=max \
            --provenance=false \
            -t $IMAGE_URI -t $IMAGE_LATEST \
            --push .
          echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT

  build-streaming:
    runs-on: ubuntu-latest
    needs: [test, terraform, detect-changes]
    if: |
      always() &&
      needs.test.result == 'success' &&
      (needs.terraform.result == 'success' || needs.terraform.result == 'skipped') &&
      needs.detect-changes.outputs.streaming == 'true'
    permissions:
      id-token: write
      contents: read
    outputs:
      image_tag: ${{ steps.build.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.GHA_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push WS consumer image
        id: build
        env:
          REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
        run: |
          [ -n "$REGISTRY" ] || { echo "ERROR: REGISTRY is empty"; exit 1; }
          IMAGE_URI=$REGISTRY/trading-analysis-ws-consumer:${{ github.sha }}
          IMAGE_LATEST=$REGISTRY/trading-analysis-ws-consumer:latest
          IMAGE_CACHE=$REGISTRY/trading-analysis-ws-consumer:cache
          docker buildx build \
            -f streaming/Dockerfile \
            --cache-from type=registry,ref=$IMAGE_CACHE \
            --cache-to   type=registry,ref=$IMAGE_CACHE,mode=max \
            --provenance=false \
            -t $IMAGE_URI -t $IMAGE_LATEST \
            --push .
          echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT

  build-pnl-consumer:
    runs-on: ubuntu-latest
    needs: [test, terraform, detect-changes]
    if: |
      always() &&
      needs.test.result == 'success' &&
      (needs.terraform.result == 'success' || needs.terraform.result == 'skipped') &&
      needs.detect-changes.outputs.pnl-consumer == 'true'
    permissions:
      id-token: write
      contents: read
    outputs:
      image_tag: ${{ steps.build.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.GHA_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push pnl-consumer image
        id: build
        env:
          REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
        run: |
          [ -n "$REGISTRY" ] || { echo "ERROR: REGISTRY is empty"; exit 1; }
          IMAGE_URI=$REGISTRY/trading-analysis-pnl-consumer:${{ github.sha }}
          IMAGE_LATEST=$REGISTRY/trading-analysis-pnl-consumer:latest
          IMAGE_CACHE=$REGISTRY/trading-analysis-pnl-consumer:cache
          docker buildx build \
            -f pnl_consumer/Dockerfile \
            --cache-from type=registry,ref=$IMAGE_CACHE \
            --cache-to   type=registry,ref=$IMAGE_CACHE,mode=max \
            --provenance=false \
            -t $IMAGE_URI -t $IMAGE_LATEST \
            --push .
          echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT

  deploy-dagster:
    runs-on: ubuntu-latest
    needs: [build-dagster, detect-changes]
    if: |
      always() &&
      needs.build-dagster.result == 'success' &&
      needs.detect-changes.outputs.dagster == 'true'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.GHA_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy Dagster to ECS
        env:
          IMAGE_TAG: ${{ needs.build-dagster.outputs.image_tag }}
          DEPLOY_REGION: ${{ secrets.AWS_REGION }}
          ECS_CLUSTER: trading-analysis
          REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
        run: |
          set -eu
          [ -n "$IMAGE_TAG" ] || { echo "ERROR: IMAGE_TAG is empty — build job output missing"; exit 1; }
          IMAGE_URI=$REGISTRY/trading-analysis-dagster:$IMAGE_TAG
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition trading-analysis-dagster \
            --region $DEPLOY_REGION \
            --query taskDefinition \
            --output json)

          NEW_TASK=$(echo "$TASK_DEF" | python3 -c "
          import sys, json
          img = sys.argv[1]
          td = json.load(sys.stdin)
          for c in td['containerDefinitions']:
              if c['name'] in ('dagster-webserver', 'dagster-daemon'):
                  c['image'] = img
          for k in ('taskDefinitionArn','revision','status','requiresAttributes','compatibilities','registeredAt','registeredBy'):
              td.pop(k, None)
          print(json.dumps(td))
          " "$IMAGE_URI")

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK" \
            --region $DEPLOY_REGION \
            --query taskDefinition.taskDefinitionArn \
            --output text)

          [ -n "$NEW_ARN" ] || { echo "ERROR: register-task-definition returned empty ARN"; exit 1; }
          echo "Registered: $NEW_ARN"

          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service trading-analysis-dagster \
            --task-definition "$NEW_ARN" \
            --force-new-deployment \
            --region $DEPLOY_REGION \
            --output json > /dev/null

      - name: Wait for Dagster service stability
        env:
          DEPLOY_REGION: ${{ secrets.AWS_REGION }}
          ECS_CLUSTER: trading-analysis
        run: |
          echo "Waiting up to 20 min for trading-analysis-dagster to stabilise..."
          for i in $(seq 1 80); do
            STATUS=$(aws ecs describe-services \
              --cluster $ECS_CLUSTER \
              --services trading-analysis-dagster \
              --region $DEPLOY_REGION \
              --query 'services[0].deployments' --output json)
            PRIMARIES=$(echo "$STATUS" | python3 -c "import sys,json; d=json.load(sys.stdin); print(sum(1 for x in d if x['status']=='PRIMARY' and x['runningCount']>=x['desiredCount'] and x['failedTasks']==0))")
            TOTAL=$(echo "$STATUS" | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d))")
            echo "Poll $i/80: deployments=$TOTAL primary_stable=$PRIMARIES"
            if [ "$PRIMARIES" = "1" ] && [ "$TOTAL" = "1" ]; then
              echo "Dagster deploy complete."
              break
            fi
            if [ "$i" = "80" ]; then
              echo "ERROR: timed out waiting for Dagster stability"; exit 1
            fi
            sleep 15
          done
          aws ecs describe-services \
            --cluster $ECS_CLUSTER \
            --services trading-analysis-dagster \
            --region $DEPLOY_REGION \
            --query 'services[*].{Name:serviceName,Status:status,Running:runningCount,Desired:desiredCount}' \
            --output table

  deploy-streaming:
    runs-on: ubuntu-latest
    needs: [build-streaming, detect-changes]
    if: |
      always() &&
      needs.build-streaming.result == 'success' &&
      needs.detect-changes.outputs.streaming == 'true'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.GHA_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy WS consumer to ECS
        env:
          IMAGE_TAG: ${{ needs.build-streaming.outputs.image_tag }}
          DEPLOY_REGION: ${{ secrets.AWS_REGION }}
          ECS_CLUSTER: trading-analysis
          REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
        run: |
          set -eu
          IMAGE_URI=$REGISTRY/trading-analysis-ws-consumer:$IMAGE_TAG
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition trading-analysis-ws-consumer \
            --region $DEPLOY_REGION --query taskDefinition --output json)
          NEW_TASK=$(echo "$TASK_DEF" | python3 -c "
          import sys, json
          img = sys.argv[1]
          td = json.load(sys.stdin)
          for c in td['containerDefinitions']:
              if c['name'] == 'ws-consumer':
                  c['image'] = img
          for k in ('taskDefinitionArn','revision','status','requiresAttributes','compatibilities','registeredAt','registeredBy'):
              td.pop(k, None)
          print(json.dumps(td))
          " "$IMAGE_URI")
          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK" \
            --region $DEPLOY_REGION \
            --query taskDefinition.taskDefinitionArn --output text)
          [ -n "$NEW_ARN" ] || { echo "ERROR: register-task-definition returned empty ARN"; exit 1; }
          echo "Registered: $NEW_ARN"
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service trading-analysis-ws-consumer \
            --task-definition "$NEW_ARN" \
            --force-new-deployment \
            --region $DEPLOY_REGION \
            --output json > /dev/null

      - name: Wait for WS consumer stability
        env:
          DEPLOY_REGION: ${{ secrets.AWS_REGION }}
          ECS_CLUSTER: trading-analysis
        run: |
          echo "Waiting up to 20 min for trading-analysis-ws-consumer to stabilise..."
          for i in $(seq 1 80); do
            STATUS=$(aws ecs describe-services \
              --cluster $ECS_CLUSTER \
              --services trading-analysis-ws-consumer \
              --region $DEPLOY_REGION \
              --query 'services[0].deployments' --output json)
            PRIMARIES=$(echo "$STATUS" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          print(sum(1 for x in d if x['status']=='PRIMARY' and x['runningCount']>=x['desiredCount'] and x['failedTasks']==0))")
            TOTAL=$(echo "$STATUS" | python3 -c "
          import sys,json; d=json.load(sys.stdin); print(len(d))")
            echo "Poll $i/80: deployments=$TOTAL primary_stable=$PRIMARIES"
            if [ "$PRIMARIES" = "1" ] && [ "$TOTAL" = "1" ]; then
              echo "WS consumer deploy complete."
              break
            fi
            if [ "$i" = "80" ]; then
              echo "ERROR: timed out waiting for ws-consumer stability"; exit 1
            fi
            sleep 15
          done

  deploy-pnl-consumer:
    runs-on: ubuntu-latest
    needs: [build-pnl-consumer, detect-changes]
    if: |
      always() &&
      needs.build-pnl-consumer.result == 'success' &&
      needs.detect-changes.outputs.pnl-consumer == 'true'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.GHA_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy pnl-consumer to ECS
        env:
          IMAGE_TAG: ${{ needs.build-pnl-consumer.outputs.image_tag }}
          DEPLOY_REGION: ${{ secrets.AWS_REGION }}
          ECS_CLUSTER: trading-analysis
          REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
        run: |
          set -eu
          [ -n "$IMAGE_TAG" ] || { echo "ERROR: IMAGE_TAG is empty — build job output missing"; exit 1; }
          IMAGE_URI=$REGISTRY/trading-analysis-pnl-consumer:$IMAGE_TAG
          for SINK in price prod real-trade bt; do
            TASK_FAMILY="trading-analysis-pnl-consumer-${SINK}"
            SERVICE_NAME="trading-analysis-pnl-consumer-${SINK}"
            echo "Deploying ${SERVICE_NAME}..."
            TASK_DEF=$(aws ecs describe-task-definition \
              --task-definition "$TASK_FAMILY" \
              --region $DEPLOY_REGION --query taskDefinition --output json)
            NEW_TASK=$(echo "$TASK_DEF" | python3 -c "
          import sys, json
          img = sys.argv[1]
          td = json.load(sys.stdin)
          for c in td['containerDefinitions']:
              if c['name'] == 'pnl-consumer':
                  c['image'] = img
          for k in ('taskDefinitionArn','revision','status','requiresAttributes','compatibilities','registeredAt','registeredBy'):
              td.pop(k, None)
          print(json.dumps(td))
            " "$IMAGE_URI")
            NEW_ARN=$(aws ecs register-task-definition \
              --cli-input-json "$NEW_TASK" \
              --region $DEPLOY_REGION \
              --query taskDefinition.taskDefinitionArn --output text)
            [ -n "$NEW_ARN" ] || { echo "ERROR: register-task-definition returned empty ARN for ${SINK}"; exit 1; }
            echo "Registered: $NEW_ARN"
            aws ecs update-service \
              --cluster $ECS_CLUSTER \
              --service "$SERVICE_NAME" \
              --task-definition "$NEW_ARN" \
              --force-new-deployment \
              --region $DEPLOY_REGION \
              --output json > /dev/null
          done

      - name: Wait for pnl-consumer stability
        env:
          DEPLOY_REGION: ${{ secrets.AWS_REGION }}
          ECS_CLUSTER: trading-analysis
        run: |
          SERVICES="trading-analysis-pnl-consumer-price trading-analysis-pnl-consumer-prod trading-analysis-pnl-consumer-real-trade trading-analysis-pnl-consumer-bt"
          echo "Waiting up to 20 min for all pnl-consumer services to stabilise..."
          for i in $(seq 1 80); do
            ALL_STABLE=true
            for SVC in $SERVICES; do
              STATUS=$(aws ecs describe-services \
                --cluster $ECS_CLUSTER \
                --services "$SVC" \
                --region $DEPLOY_REGION \
                --query 'services[0].deployments' --output json)
              PRIMARIES=$(echo "$STATUS" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          print(sum(1 for x in d if x['status']=='PRIMARY' and x['runningCount']>=x['desiredCount'] and x['failedTasks']==0))")
              TOTAL=$(echo "$STATUS" | python3 -c "
          import sys,json; d=json.load(sys.stdin); print(len(d))")
              echo "Poll $i/80 [$SVC]: deployments=$TOTAL primary_stable=$PRIMARIES"
              if [ "$PRIMARIES" != "1" ] || [ "$TOTAL" != "1" ]; then
                ALL_STABLE=false
              fi
            done
            if [ "$ALL_STABLE" = "true" ]; then
              echo "All pnl-consumer services stable."
              break
            fi
            if [ "$i" = "80" ]; then
              echo "ERROR: timed out waiting for pnl-consumer stability"; exit 1
            fi
            sleep 15
          done

  terraform:
    runs-on: ubuntu-latest
    needs: [test, detect-changes]
    if: needs.detect-changes.outputs.terraform == 'true'
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.GHA_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install Terraform 1.5.7
        run: |
          curl -sSL https://releases.hashicorp.com/terraform/1.5.7/terraform_1.5.7_linux_amd64.zip -o tf.zip
          unzip tf.zip && sudo mv terraform /usr/local/bin/ && rm tf.zip

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Apply
        run: |
          terraform apply \
            -auto-approve \
            -input=false \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="environment=default" \
            -var="github_repo=williamwxz/trading-analysis"

  deploy-grafana-cloud:
    runs-on: ubuntu-latest
    needs: [terraform, detect-changes]
    if: |
      always() &&
      (needs.terraform.result == 'success' || needs.terraform.result == 'skipped') &&
      needs.detect-changes.outputs.grafana == 'true'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.GHA_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upsert CloudWatch datasource in Grafana Cloud
        env:
          GRAFANA_CLOUD_TOKEN: ${{ secrets.GRAFANA_CLOUD_TOKEN }}
          GRAFANA_CLOUD_URL: ${{ secrets.GRAFANA_CLOUD_URL }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          set -eu
          SECRET=$(aws secretsmanager get-secret-value \
            --secret-id trading-analysis/grafana-cloudwatch \
            --region ap-northeast-1 \
            --query SecretString --output text)
          CW_KEY_ID=$(echo "$SECRET" | python3 -c "import sys,json; print(json.load(sys.stdin)['access_key_id'])")
          CW_SECRET=$(echo "$SECRET" | python3 -c "import sys,json; print(json.load(sys.stdin)['secret_access_key'])")

          PAYLOAD=$(python3 -c "
          import json, sys
          print(json.dumps({
            'name': 'cloudwatch',
            'type': 'cloudwatch',
            'uid': 'cloudwatch',
            'access': 'proxy',
            'isDefault': False,
            'jsonData': {
              'authType': 'keys',
              'defaultRegion': 'us-east-1',
            },
            'secureJsonData': {
              'accessKey': sys.argv[1],
              'secretKey': sys.argv[2],
            },
          }))
          " "$CW_KEY_ID" "$CW_SECRET")

          # GET datasource by name to find its ID, then PUT to update or POST to create
          DS_ID=$(curl -s \
            -H "Authorization: Bearer $GRAFANA_CLOUD_TOKEN" \
            "$GRAFANA_CLOUD_URL/api/datasources/name/cloudwatch" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null || true)

          if [[ -n "$DS_ID" ]]; then
            echo "Datasource found (id=$DS_ID), updating..."
            HTTP_STATUS=$(curl -s -o /tmp/grafana_ds_response.json -w "%{http_code}" \
              -X PUT \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $GRAFANA_CLOUD_TOKEN" \
              "$GRAFANA_CLOUD_URL/api/datasources/$DS_ID" \
              -d "$PAYLOAD")
          else
            echo "Datasource not found, creating..."
            HTTP_STATUS=$(curl -s -o /tmp/grafana_ds_response.json -w "%{http_code}" \
              -X POST \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $GRAFANA_CLOUD_TOKEN" \
              "$GRAFANA_CLOUD_URL/api/datasources" \
              -d "$PAYLOAD")
          fi
          if [[ "$HTTP_STATUS" -lt 200 || "$HTTP_STATUS" -ge 300 ]]; then
            echo "ERROR: datasource upsert returned HTTP $HTTP_STATUS"
            cat /tmp/grafana_ds_response.json
            exit 1
          fi
          echo "OK: CloudWatch datasource upserted (HTTP $HTTP_STATUS)"

      - name: Push dashboards to Grafana Cloud
        env:
          GRAFANA_CLOUD_TOKEN: ${{ secrets.GRAFANA_CLOUD_TOKEN }}
          GRAFANA_CLOUD_URL: ${{ secrets.GRAFANA_CLOUD_URL }}
        run: |
          set -eu
          for file in infra/grafana/dashboards/*.json; do
            echo "Uploading $file..."
            HTTP_STATUS=$(curl -s -o /tmp/grafana_response.json -w "%{http_code}" \
              -X POST \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $GRAFANA_CLOUD_TOKEN" \
              "$GRAFANA_CLOUD_URL/api/dashboards/db" \
              -d "{\"dashboard\": $(cat "$file"), \"overwrite\": true, \"folderId\": 0}")
            if [[ "$HTTP_STATUS" -lt 200 || "$HTTP_STATUS" -ge 300 ]]; then
              echo "ERROR: $file returned HTTP $HTTP_STATUS"
              cat /tmp/grafana_response.json
              exit 1
            fi
            echo "OK: $file (HTTP $HTTP_STATUS)"
          done
          echo "All dashboards uploaded."

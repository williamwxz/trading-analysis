name: CI/CD

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Upgrade pip
        run: pip install --upgrade pip setuptools wheel

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short -m "not integration"

  build:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write
      contents: read
    outputs:
      image_uri: ${{ steps.build_dagster.outputs.image_uri }}
      grafana_image_uri: ${{ steps.build_grafana.outputs.grafana_image_uri }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.GHA_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Dagster image
        id: build_dagster
        env:
          REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
        run: |
          IMAGE_URI=$REGISTRY/trading-analysis-dagster:${{ github.sha }}
          IMAGE_LATEST=$REGISTRY/trading-analysis-dagster:latest
          IMAGE_CACHE=$REGISTRY/trading-analysis-dagster:cache
          docker buildx build \
            --cache-from type=registry,ref=$IMAGE_CACHE \
            --cache-to   type=registry,ref=$IMAGE_CACHE,mode=max \
            --provenance=false \
            -t $IMAGE_URI -t $IMAGE_LATEST \
            --push .
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Build and push Grafana image
        id: build_grafana
        env:
          REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
        run: |
          GRAFANA_IMAGE_URI=$REGISTRY/trading-analysis-grafana:${{ github.sha }}
          GRAFANA_IMAGE_LATEST=$REGISTRY/trading-analysis-grafana:latest
          GRAFANA_IMAGE_CACHE=$REGISTRY/trading-analysis-grafana:cache
          docker buildx build \
            --cache-from type=registry,ref=$GRAFANA_IMAGE_CACHE \
            --cache-to   type=registry,ref=$GRAFANA_IMAGE_CACHE,mode=max \
            --provenance=false \
            -f Dockerfile.grafana \
            -t $GRAFANA_IMAGE_URI -t $GRAFANA_IMAGE_LATEST \
            --push .
          echo "grafana_image_uri=$GRAFANA_IMAGE_URI" >> $GITHUB_OUTPUT

  schema:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.GHA_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install clickhouse-client
        run: |
          curl -fsSL https://packages.clickhouse.com/rpm/lts/repodata/repomd.xml.key \
            | gpg --dearmor -o /usr/share/keyrings/clickhouse-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/clickhouse-keyring.gpg] https://packages.clickhouse.com/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/clickhouse.list
          sudo apt-get update -q && sudo apt-get install -y -q clickhouse-client

      - name: Apply ClickHouse schema
        run: |
          CH_SECRET=$(aws secretsmanager get-secret-value \
            --secret-id trading-analysis/clickhouse \
            --region ${{ secrets.AWS_REGION }} \
            --query SecretString --output text)
          CLICKHOUSE_HOST=$(echo $CH_SECRET | python3 -c "import sys,json; print(json.load(sys.stdin)['host'])")
          CLICKHOUSE_PASSWORD=$(echo $CH_SECRET | python3 -c "import sys,json; print(json.load(sys.stdin)['password'])")
          unset CH_SECRET
          clickhouse-client \
            --host "$CLICKHOUSE_HOST" \
            --port 9440 \
            --secure \
            --user default \
            --password "$CLICKHOUSE_PASSWORD" \
            --multiquery < schemas/clickhouse_cloud.sql
          echo "Schema applied."

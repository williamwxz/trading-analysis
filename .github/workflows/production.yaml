name: Trading Analysis — Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  AWS_REGION: ap-northeast-1          # Tokyo
  IMAGE_NAME: trading-analysis-dagster
  ECS_CLUSTER: trading-analysis-production
  ECS_SERVICE_DAGSTER: trading-analysis-production-dagster
  ECS_SERVICE_GRAFANA: trading-analysis-production-grafana

permissions:
  id-token: write   # Required for OIDC token
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. Test
  # ─────────────────────────────────────────────────────────────────────────
  test:
    name: Run Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

  # ─────────────────────────────────────────────────────────────────────────
  # 2. Terraform Plan
  # ─────────────────────────────────────────────────────────────────────────
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - run: terraform fmt -check -recursive
        continue-on-error: true

      - run: terraform init

      - run: terraform validate

      - run: terraform plan -no-color -input=false -out=tfplan
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_environment: production

      - uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-production
          path: infra/terraform/tfplan
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────
  # 3. Terraform Apply
  # ─────────────────────────────────────────────────────────────────────────
  terraform-apply:
    name: Terraform Apply
    needs: [terraform-plan, test]
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - run: terraform init

      - uses: actions/download-artifact@v4
        with:
          name: terraform-plan-production
          path: infra/terraform

      - run: terraform apply -auto-approve -input=false tfplan

      - run: terraform output

  # ─────────────────────────────────────────────────────────────────────────
  # 4. Build & Push Docker Image
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [terraform-apply]
    environment: production
    outputs:
      image: ${{ steps.image.outputs.uri }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Set image URI
        id: image
        run: |
          echo "uri=${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.uri }}
            ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.IMAGE_NAME }}:latest
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────
  # 5. Apply ClickHouse Schema (only when schema file changed)
  # ─────────────────────────────────────────────────────────────────────────
  clickhouse-schema:
    name: Apply ClickHouse Schema
    runs-on: ubuntu-latest
    needs: [build]
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            schema:
              - 'schemas/clickhouse_cloud.sql'

      - if: steps.filter.outputs.schema == 'true'
        name: Install clickhouse-client
        run: |
          sudo apt-get install -y apt-transport-https ca-certificates curl gnupg
          curl -fsSL 'https://packages.clickhouse.com/rpm/lts/repodata/repomd.xml.key' | sudo gpg --dearmor -o /usr/share/keyrings/clickhouse-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/clickhouse-keyring.gpg] https://packages.clickhouse.com/deb stable main" | sudo tee /etc/apt/sources.list.d/clickhouse.list
          sudo apt-get update
          sudo apt-get install -y clickhouse-client

      - if: steps.filter.outputs.schema == 'true'
        name: Apply schema
        env:
          CLICKHOUSE_HOST: ${{ secrets.CLICKHOUSE_HOST }}
          CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
        run: |
          echo "🗄️  Applying ClickHouse Cloud schema..."
          clickhouse-client \
            --host "$CLICKHOUSE_HOST" \
            --port 9440 \
            --secure \
            --user default \
            --password "$CLICKHOUSE_PASSWORD" \
            --multiquery < schemas/clickhouse_cloud.sql
          echo "✅ Schema applied"

      - if: steps.filter.outputs.schema != 'true'
        run: echo "⏭️  Schema unchanged — skipping"

  # ─────────────────────────────────────────────────────────────────────────
  # 6. Deploy Dagster to ECS Fargate
  # ─────────────────────────────────────────────────────────────────────────
  deploy-dagster:
    name: Deploy Dagster (ECS)
    runs-on: ubuntu-latest
    needs: [build, clickhouse-schema]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Update ECS task definition with new image
        id: task-def
        run: |
          IMAGE="${{ needs.build.outputs.image }}"

          # Fetch current task definition
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_SERVICE_DAGSTER }} \
            --query 'taskDefinition' \
            --output json)

          # Update both containers (webserver + daemon) to new image
          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
            --arg img "$IMAGE" \
            '.containerDefinitions |= map(
               if .name == "dagster-webserver" or .name == "dagster-daemon"
               then .image = $img
               else .
               end
             ) |
             del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                 .compatibilities, .registeredAt, .registeredBy)')

          # Register new task definition revision
          NEW_REVISION=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "revision=$NEW_REVISION" >> "$GITHUB_OUTPUT"
          echo "📋 Registered task definition: $NEW_REVISION"

      - name: Deploy to ECS service
        run: |
          echo "🚀 Deploying Dagster to ECS Fargate..."
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE_DAGSTER }} \
            --task-definition ${{ steps.task-def.outputs.revision }} \
            --force-new-deployment \
            --output json > /dev/null

          echo "⏳ Waiting for service to stabilize..."
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE_DAGSTER }}

          echo "✅ Dagster deployment complete"

      - name: Verify deployment
        run: |
          aws ecs describe-services \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE_DAGSTER }} \
            --query 'services[0].{Status:status,Running:runningCount,Desired:desiredCount,TaskDef:taskDefinition}' \
            --output table

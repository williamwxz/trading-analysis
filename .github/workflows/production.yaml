name: Production Deployment

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    # This must match the CodeBuild project name prefix
    runs-on: codebuild-trading-analysis-production-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Run Tests
        run: |
          pytest tests/

      - name: Build and Push Docker Image
        env:
          DEPLOY_REGION: ap-northeast-1
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          IMAGE_NAME: trading-analysis-dagster
        run: |
          # Replicate buildspec/build.yml logic
          aws ecr get-login-password --region $DEPLOY_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$DEPLOY_REGION.amazonaws.com
          docker build -t $IMAGE_NAME .
          docker tag $IMAGE_NAME:latest $AWS_ACCOUNT_ID.dkr.ecr.$DEPLOY_REGION.amazonaws.com/$IMAGE_NAME:latest
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$DEPLOY_REGION.amazonaws.com/$IMAGE_NAME:latest

      - name: Deploy to ECS
        env:
          DEPLOY_REGION: ap-northeast-1
          ECS_CLUSTER: trading-analysis-production
          ECS_SERVICE: trading-analysis-production-dagster
        run: |
          # Trigger ECS deployment
          aws ecs update-service --cluster $ECS_CLUSTER --service $ECS_SERVICE --force-new-deployment --region $DEPLOY_REGION

version: 0.2

# -----------------------------------------------------------------------------
# Stage: Infra
# Provision/Update AWS Infrastructure via Terraform.
# -----------------------------------------------------------------------------

phases:
  install:
    commands:
      - TF_VERSION=1.5.7
      - curl -sSL https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_linux_amd64.zip -o tf.zip
      - unzip tf.zip && mv terraform /usr/local/bin/ && rm tf.zip
      - terraform version

  build:
    commands:
      - echo "=== Terraform Plan & Apply ==="
      - cd infra/terraform
      - terraform init -input=false
      - |
        # Self-healing: Import Grafana repo if it exists but is not in state
        if ! terraform state show aws_ecr_repository.grafana >/dev/null 2>&1; then
          if aws ecr describe-repositories --repository-names trading-analysis-grafana --region $DEPLOY_REGION >/dev/null 2>&1; then
            terraform import -input=false aws_ecr_repository.grafana trading-analysis-grafana || true
          fi
        fi
      - terraform apply -auto-approve -input=false -var="aws_region=$DEPLOY_REGION" -var="environment=default" -var="github_repo=${GITHUB_REPO:-williamwxz/trading-analysis}"

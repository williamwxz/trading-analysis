version: 0.2

# -----------------------------------------------------------------------------
# Stage: Build
# Builds Docker images for Dagster and Grafana and pushes to ECR.
# -----------------------------------------------------------------------------

env:
  exported-variables:
    - IMAGE_URI
    - GRAFANA_IMAGE_URI

phases:
  pre_build:
    commands:
      - 'echo "Logging in to ECR in $DEPLOY_REGION..."'
      - 'aws ecr get-login-password --region $DEPLOY_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$DEPLOY_REGION.amazonaws.com'
      
      # Set Defaults if variables are missing (handles bootstrap issues)
      - 'IMAGE_NAME=${IMAGE_NAME:-trading-analysis-dagster}'
      - 'GRAFANA_IMAGE_NAME=${GRAFANA_IMAGE_NAME:-trading-analysis-grafana}'
      
      # Dagster Image Vars
      - 'IMAGE_URI=$AWS_ACCOUNT_ID.dkr.ecr.$DEPLOY_REGION.amazonaws.com/$IMAGE_NAME:$CODEBUILD_RESOLVED_SOURCE_VERSION'
      - 'IMAGE_LATEST=$AWS_ACCOUNT_ID.dkr.ecr.$DEPLOY_REGION.amazonaws.com/$IMAGE_NAME:latest'
      
      # Grafana Image Vars
      - 'GRAFANA_IMAGE_URI=$AWS_ACCOUNT_ID.dkr.ecr.$DEPLOY_REGION.amazonaws.com/$GRAFANA_IMAGE_NAME:$CODEBUILD_RESOLVED_SOURCE_VERSION'
      - 'GRAFANA_IMAGE_LATEST=$AWS_ACCOUNT_ID.dkr.ecr.$DEPLOY_REGION.amazonaws.com/$GRAFANA_IMAGE_NAME:latest'

  build:
    commands:
      - 'echo "Building Dagster image..."'
      - 'docker build --cache-from $IMAGE_LATEST --build-arg BUILDKIT_INLINE_CACHE=1 -t $IMAGE_URI -t $IMAGE_LATEST .'
      
      - 'echo "Building Grafana image..."'
      - 'docker build -f Dockerfile.grafana -t $GRAFANA_IMAGE_URI -t $GRAFANA_IMAGE_LATEST .'

  post_build:
    commands:
      - 'echo "Pushing images to ECR..."'
      - 'docker push $IMAGE_URI'
      - 'docker push $IMAGE_LATEST'
      - 'docker push $GRAFANA_IMAGE_URI'
      - 'docker push $GRAFANA_IMAGE_LATEST'
      
      - 'echo "Images pushed successfully."'
      - 'echo $IMAGE_URI > image_uri.txt'
      - 'echo $GRAFANA_IMAGE_URI > grafana_image_uri.txt'
      - 'printf ''{"ImageURI":"%s","GrafanaImageURI":"%s"}'' "$IMAGE_URI" "$GRAFANA_IMAGE_URI" > imageDetail.json'

artifacts:
  files:
    - image_uri.txt
    - grafana_image_uri.txt
    - imageDetail.json

version: 0.2

# -----------------------------------------------------------------------------
# Stage: Build
# Builds Docker images for Dagster and Grafana and pushes to ECR.
# -----------------------------------------------------------------------------

env:
  exported-variables:
    - IMAGE_URI
    - GRAFANA_IMAGE_URI

phases:
  pre_build:
    commands:
      - 'echo "Logging in to ECR in $DEPLOY_REGION..."'
      - 'aws ecr get-login-password --region $DEPLOY_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$DEPLOY_REGION.amazonaws.com'
      - 'docker pull public.ecr.aws/docker/library/python:3.11-slim'
      - 'docker pull public.ecr.aws/grafana/grafana:11.0.0'
      - |
        # Set Defaults and Export variables so they persist in the shell environment
        export IMAGE_NAME=${IMAGE_NAME:-trading-analysis-dagster}
        export GRAFANA_IMAGE_NAME=${GRAFANA_IMAGE_NAME:-trading-analysis-grafana}
        
        # Use Build Number as fallback if Resolved Source Version is missing
        export TAG=${CODEBUILD_RESOLVED_SOURCE_VERSION:-build-$CODEBUILD_BUILD_NUMBER}
        echo "Using tag: $TAG"
        
        export IMAGE_URI=$AWS_ACCOUNT_ID.dkr.ecr.$DEPLOY_REGION.amazonaws.com/$IMAGE_NAME:$TAG
        export IMAGE_LATEST=$AWS_ACCOUNT_ID.dkr.ecr.$DEPLOY_REGION.amazonaws.com/$IMAGE_NAME:latest
        
        export GRAFANA_IMAGE_URI=$AWS_ACCOUNT_ID.dkr.ecr.$DEPLOY_REGION.amazonaws.com/$GRAFANA_IMAGE_NAME:$TAG
        export GRAFANA_IMAGE_LATEST=$AWS_ACCOUNT_ID.dkr.ecr.$DEPLOY_REGION.amazonaws.com/$GRAFANA_IMAGE_NAME:latest
        
        echo "Dagster URI: $IMAGE_URI"
        echo "Grafana URI: $GRAFANA_IMAGE_URI"
        
        # Write to a file to be safe if shells are not shared
        echo "export IMAGE_URI=$IMAGE_URI" > build_env.sh
        echo "export IMAGE_LATEST=$IMAGE_LATEST" >> build_env.sh
        echo "export GRAFANA_IMAGE_URI=$GRAFANA_IMAGE_URI" >> build_env.sh
        echo "export GRAFANA_IMAGE_LATEST=$GRAFANA_IMAGE_LATEST" >> build_env.sh

  build:
    commands:
      - . ./build_env.sh
      - 'echo "Building Dagster image..."'
      - 'docker build --cache-from $IMAGE_LATEST --build-arg BUILDKIT_INLINE_CACHE=1 -t $IMAGE_URI -t $IMAGE_LATEST .'
      
      - 'echo "Building Grafana image..."'
      - 'docker build -f Dockerfile.grafana -t $GRAFANA_IMAGE_URI -t $GRAFANA_IMAGE_LATEST .'

  post_build:
    commands:
      - . ./build_env.sh
      - 'echo "Pushing images to ECR..."'
      - 'docker push $IMAGE_URI'
      - 'docker push $IMAGE_LATEST'
      - 'docker push $GRAFANA_IMAGE_URI'
      - 'docker push $GRAFANA_IMAGE_LATEST'
      
      - 'echo "Images pushed successfully."'
      - 'echo $IMAGE_URI > image_uri.txt'
      - 'echo $GRAFANA_IMAGE_URI > grafana_image_uri.txt'
      - 'printf ''{"ImageURI":"%s","GrafanaImageURI":"%s"}'' "$IMAGE_URI" "$GRAFANA_IMAGE_URI" > imageDetail.json'

artifacts:
  files:
    - image_uri.txt
    - grafana_image_uri.txt
    - imageDetail.json

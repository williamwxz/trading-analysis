# Local development stack
# Usage: docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dagster
      POSTGRES_PASSWORD: dagster
      POSTGRES_DB: dagster
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  dagster-webserver:
    build: .
    command: dagster-webserver -h 0.0.0.0 -p 3000
    ports:
      - "3000:3000"
    environment:
      DAGSTER_HOME: /app
      DAGSTER_PG_HOST: postgres
      DAGSTER_PG_PORT: "5432"
      DAGSTER_PG_USER: dagster
      DAGSTER_PG_PASSWORD: dagster
      DAGSTER_PG_DB: dagster
      CLICKHOUSE_HOST: ${CLICKHOUSE_HOST:-localhost}
      CLICKHOUSE_PORT: ${CLICKHOUSE_PORT:-8443}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      CLICKHOUSE_SECURE: ${CLICKHOUSE_SECURE:-true}
    volumes:
      - ./dagster.local.yaml:/app/dagster.yaml:ro
    depends_on:
      - postgres

  dagster-daemon:
    build: .
    command: dagster-daemon run
    environment:
      DAGSTER_HOME: /app
      DAGSTER_PG_HOST: postgres
      DAGSTER_PG_PORT: "5432"
      DAGSTER_PG_USER: dagster
      DAGSTER_PG_PASSWORD: dagster
      DAGSTER_PG_DB: dagster
      CLICKHOUSE_HOST: ${CLICKHOUSE_HOST:-localhost}
      CLICKHOUSE_PORT: ${CLICKHOUSE_PORT:-8443}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      CLICKHOUSE_SECURE: ${CLICKHOUSE_SECURE:-true}
    volumes:
      - ./dagster.local.yaml:/app/dagster.yaml:ro
    depends_on:
      - postgres

  grafana:
    image: grafana/grafana:11.0.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana

volumes:
  pgdata:
  grafana_data:

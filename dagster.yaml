# Dagster instance configuration — trading-analysis
# Runs on ECS Fargate with ClickHouse Cloud as analytics DB.
# Storage: Postgres (Supabase)

storage:
  postgres:
    postgres_db:
      username: { env: DAGSTER_PG_USER }
      password: { env: DAGSTER_PG_PASSWORD }
      hostname: { env: DAGSTER_PG_HOST }
      db_name: { env: DAGSTER_PG_DB }
      port: 5432
      params:
        sslmode: require

run_queue:
  tag_concurrency_limits:
    - key: "dagster/asset_key"
      value: "pnl_bt_v2_daily"
      limit: 3

run_launcher:
  module: dagster.core.launcher.default_run_launcher
  class: DefaultRunLauncher

run_monitoring:
  enabled: true
  max_resume_run_attempts: 0

compute_logs:
  module: dagster.core.storage.noop_compute_log_manager
  class: NoOpComputeLogManager

local_artifact_storage:
  module: dagster.core.storage.root
  class: LocalArtifactStorage
  config:
    base_dir: /tmp/dagster-storage

concurrency:
  runs:
    max_concurrent_runs: 5
  pools:
    default_limit: 5

retention:
  schedule:
    purge_after_days:
      skipped: 7
      success: 14
      failure: 14
  sensor:
    purge_after_days:
      skipped: 7
      success: 14
      failure: 14

python_logs:
  managed_python_loggers:
    - trading_dagster

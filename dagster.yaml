# Dagster instance configuration — trading-analysis
# Runs on ECS Fargate with ClickHouse Cloud as analytics DB.
# Storage: Postgres (Supabase)

storage:
  postgres:
    postgres_db:
      username: { env: DAGSTER_PG_USER }
      password: { env: DAGSTER_PG_PASSWORD }
      hostname: { env: DAGSTER_PG_HOST }
      db_name: { env: DAGSTER_PG_DB }
      port: 5432
      params:
        sslmode: require

run_launcher:
  module: dagster_aws.ecs
  class: EcsRunLauncher
  config:
    task_definition: { env: DAGSTER_RUN_TASK_DEFINITION_ARN }
    container_name: dagster-user-code
    run_resources:
      cpu: "512"
      memory: "1024"
    run_task_kwargs:
      capacityProviderStrategy:
        - capacityProvider: FARGATE_SPOT
          weight: 1

compute_logs:
  module: dagster.core.storage.noop_compute_log_manager
  class: NoOpComputeLogManager

local_artifact_storage:
  module: dagster.core.storage.root
  class: LocalArtifactStorage
  config:
    base_dir: /tmp/dagster-storage

run_queue:
  max_concurrent_runs: 25

concurrency:
  default_op_concurrency_limit: 5

retention:
  schedule:
    purge_after_days:
      skipped: 30
  sensor:
    purge_after_days:
      skipped: 30

python_logs:
  managed_python_loggers:
    - trading_dagster

# Dagster instance configuration — trading-analysis
# Runs on ECS Fargate with ClickHouse Cloud as analytics DB.
# Storage: Postgres (Supabase)

storage:
  postgres:
    postgres_db:
      username: { env: DAGSTER_PG_USER }
      password: { env: DAGSTER_PG_PASSWORD }
      hostname: { env: DAGSTER_PG_HOST }
      db_name: { env: DAGSTER_PG_DB }
      port: 5432
      params:
        sslmode: require

run_launcher:
  module: dagster_aws.ecs
  class: EcsRunLauncher
  config:
    task_definition:
      log_group: /ecs/trading-analysis-dagster
      task_role_arn: "arn:aws:iam::068704208855:role/trading-analysis-ecs-task"
      execution_role_arn: "arn:aws:iam::068704208855:role/trading-analysis-ecs-execution"
    container_name: dagster-code-server
    secrets:
      - name: CLICKHOUSE_HOST
        valueFrom: "arn:aws:secretsmanager:ap-northeast-1:068704208855:secret:trading-analysis/clickhouse-tVGomt:host::"
      - name: CLICKHOUSE_PASSWORD
        valueFrom: "arn:aws:secretsmanager:ap-northeast-1:068704208855:secret:trading-analysis/clickhouse-tVGomt:password::"
      - name: DAGSTER_PG_HOST
        valueFrom: "arn:aws:secretsmanager:ap-northeast-1:068704208855:secret:trading-analysis/supabase-ARkLCs:host::"
      - name: DAGSTER_PG_PASSWORD
        valueFrom: "arn:aws:secretsmanager:ap-northeast-1:068704208855:secret:trading-analysis/supabase-ARkLCs:password::"
      - name: DAGSTER_PG_USER
        valueFrom: "arn:aws:secretsmanager:ap-northeast-1:068704208855:secret:trading-analysis/supabase-ARkLCs:user::"
    env_vars:
      - CLICKHOUSE_USER=dev_ro3
      - CLICKHOUSE_PORT=8443
      - CLICKHOUSE_SECURE=true
      - DAGSTER_PG_DB=postgres
      - DAGSTER_HOME=/app
    run_resources:
      cpu: "512"
      memory: "1024"
    run_task_kwargs:
      capacityProviderStrategy:
        - capacityProvider: FARGATE_SPOT
          weight: 1

compute_logs:
  module: dagster.core.storage.noop_compute_log_manager
  class: NoOpComputeLogManager

local_artifact_storage:
  module: dagster.core.storage.root
  class: LocalArtifactStorage
  config:
    base_dir: /tmp/dagster-storage

run_queue:
  max_concurrent_runs: 25

concurrency:
  default_op_concurrency_limit: 5

retention:
  schedule:
    purge_after_days:
      skipped: 30
  sensor:
    purge_after_days:
      skipped: 30

python_logs:
  managed_python_loggers:
    - trading_dagster
